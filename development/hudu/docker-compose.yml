# Hudu self-hosted, Caddy-fronted (no Hudu nginx).
#
# Adapted from the upstream Hudu docker-compose at
# https://support.hudu.com/hc/en-us/articles/11650043659799 with these
# deliberate deviations:
#
#   - The bundled `nginx` service (linuxserver/nginx) is removed.
#     Caddy-docker-proxy on the external `caddy` network reverse-proxies
#     directly to the Rails app's Puma.
#   - The `worker` service drops the `.:/app` host bind that exists upstream
#     — that's a dev-mode override we don't need.
#   - Service named `db` (matches DB_HOST=db generated by hudu-env-wizard.sh).
#   - Container names are prefixed with COMPOSE_PROJECT to avoid collisions
#     with the bingham nautobot stack and any other sibling deployments.
#   - DISABLE_SSL=true and BEHIND_TLS_PROXY=true MUST be set in .env so the
#     app generates https:// URLs in callbacks/emails behind Caddy's TLS.

x-hudu-common: &hudu-common
  image: hududocker/hudu:latest
  env_file:
    - .env
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-file: "5"
      max-size: "100m"

services:
  db:
    image: postgres:17.2
    container_name: ${COMPOSE_PROJECT}-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-file: "5"
        max-size: "10m"

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT}-redis
    command: redis-server
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  app:
    <<: *hudu-common
    container_name: ${COMPOSE_PROJECT}-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/var/www/hudu2/public/uploads/
      - app_data:/var/www/hudu2/uploads/
      - app_data:/var/lib/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - internal
      - caddy
    labels:
      caddy: ${DOMAIN}
      # Puma binds 3000 by default in the Hudu image. If routing fails after
      # boot, run `docker compose exec app netstat -tnlp` to confirm the port.
      caddy.reverse_proxy: "{{upstreams 3000}}"
      caddy.encode: "gzip zstd"
      # Hudu uses ActionCable WebSockets; Caddy 2 handles WS upgrade by default,
      # no extra labels needed.

  worker:
    <<: *hudu-common
    container_name: ${COMPOSE_PROJECT}-worker
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/var/www/hudu2/public/uploads/
      - app_data:/var/www/hudu2/uploads/
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sidekiq > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  app_data:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
